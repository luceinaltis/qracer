# .qracer/config.toml — global application settings
# Copy this file to ~/.qracer/config.toml or ./.qracer/config.toml

default_mode = "quick"        # "quick" or "deep"
llm_provider = "claude"
llm_model = "claude-sonnet-4-20250514"
language = "en"

# Analysis loop tuning
max_iterations = 3            # max reasoning iterations before returning
confidence_threshold = 0.7    # 0.0–1.0, stop early when confidence exceeds this

# Pipeline defaults
lookback_days = 30            # days of price history to fetch
staleness_hours = 24          # hours before data is considered stale

# Autonomous monitoring (qracer serve)
autonomous_enabled = true              # enable watchlist monitoring during market hours
autonomous_check_interval_seconds = 60 # seconds between autonomous scans
price_move_threshold_pct = 2.0         # % move to trigger an alert
alert_cooldown_minutes = 30            # minutes before re-alerting the same ticker
