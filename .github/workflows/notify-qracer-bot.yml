name: Notify Reviewer

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify-reviewer:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wake OpenClaw
        run: |
          curl -s -X POST "${{ secrets.OPENCLAW_HOOK_URL }}/hooks/wake" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"PR #${{ github.event.workflow_run.name }} CI passed — ready for review\", \"mode\": \"now\"}"

      - name: Notify Telegram
        run: |
          TEXT="✅ CI passed%0APR: ${{ github.event.workflow_run.head_branch }}%0A${{ github.event.workflow_run.html_url }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}"
