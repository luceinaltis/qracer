# .qracer/providers.toml — provider configuration
# Copy this file to ~/.qracer/providers.toml or ./.qracer/providers.toml

[providers.yfinance]
enabled = true
priority = 100
tier = "hot"
kind = "data"

[providers.claude]
enabled = true
priority = 100
kind = "llm"
api_key_env = "ANTHROPIC_API_KEY"

[providers.openai]
enabled = false
priority = 50
kind = "llm"
api_key_env = "OPENAI_API_KEY"

[providers.gemini]
enabled = false
priority = 50
kind = "llm"
api_key_env = "GOOGLE_API_KEY"

